# Render Blueprint — backend (web service) + frontend (static site), ikkalasi ham free tier.
# Render dashboardida "New > Blueprint" orqali repo ulansa, shu fayl asosida yaratiladi.
services:
  - type: web
    name: nmpi-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL # Neon'dan olingan pooled connection string
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ADMIN_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL # masalan: https://nmpi-frontend.onrender.com
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: "25"
      - key: AI_PROVIDER # gemini yoki grok
        value: gemini
      - key: AI_API_KEY # Gemini kaliti: aistudio.google.com/apikey (bepul)
        sync: false

  - type: web
    name: nmpi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL # masalan: https://nmpi-backend.onrender.com/api
        sync: false
